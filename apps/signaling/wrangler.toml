name = "oneclickcast-signaling"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
# new_sqlite_classes is required for Durable Objects on the free plan.
# (Cloudflare made SQLite-backed storage the default in 2025; the legacy
# new_classes migration only works on the paid Workers plan.)
new_sqlite_classes = ["Room"]

[observability]
enabled = true

# Public Supabase URL — safe to commit. Service-role key goes via secret.
[vars]
SUPABASE_URL = "https://wajtoatkvmqabjykurcw.supabase.co"

# Set the service-role key once via:
#   pnpm exec wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# Find it at https://supabase.com/dashboard/project/_/settings/api (under
# "service_role" — bypasses RLS, server-only). NEVER commit this value.
#
# TURN server config (optional). For production, sign up at https://www.metered.ca/
# (free tier: 50GB/mo) and set these via:
#   pnpm exec wrangler secret put TURN_HOST
#   pnpm exec wrangler secret put TURN_USERNAME
#   pnpm exec wrangler secret put TURN_CREDENTIAL
# When unset, the worker falls back to STUN-only (works on most home networks).
